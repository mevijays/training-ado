# Reusable Docker build+push to ACR via AzureCLI (OIDC service connection).
parameters:
  - name: serviceConnection
    type: string
    default: 'sc-azure'
  - name: acrName
    type: string
  - name: imageName
    type: string
  - name: dockerContext
    type: string
    default: '$(Build.SourcesDirectory)'
  - name: dockerfile
    type: string
    default: 'Dockerfile'
  - name: tags
    type: object
    default: ['$(Build.BuildId)']

steps:
  - task: AzureCLI@2
    displayName: 'Docker build and push to ACR'
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        az acr login --name ${{ parameters.acrName }}
        TAGS_FLAGS=""
        for t in ${{ join(' ', parameters.tags) }}; do
          TAGS_FLAGS="$TAGS_FLAGS -t ${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:$t"
        done
        docker build $TAGS_FLAGS -f ${{ parameters.dockerContext }}/${{ parameters.dockerfile }} ${{ parameters.dockerContext }}
        for t in ${{ join(' ', parameters.tags) }}; do
          docker push ${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}:$t
        done
