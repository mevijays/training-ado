apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-api
  namespace: blueleaf
  labels: { app: bookstore-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: bookstore-api }
  template:
    metadata:
      labels: { app: bookstore-api }
    spec:
      containers:
        - name: api
          image: REPLACE_ACR.azurecr.io/bookstore-api:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 768Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bookstore-api
  namespace: blueleaf
spec:
  selector: { app: bookstore-api }
  ports: [{ port: 80, targetPort: 8080 }]
  type: ClusterIP
